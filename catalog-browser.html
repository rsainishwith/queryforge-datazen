<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueryForge DataZen — Catalog Browser Test</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0f1a;
    --bg2:       #111827;
    --bg3:       #1a2235;
    --sidebar:   #0d1220;
    --border:    rgba(56,189,248,0.12);
    --border2:   rgba(56,189,248,0.06);
    --accent:    #38bdf8;
    --accent2:   #0ea5e9;
    --gold:      #fbbf24;
    --green:     #34d399;
    --red:       #f87171;
    --xdm:       #a78bfa;
    --folder:    #60a5fa;
    --text:      #e2e8f0;
    --text2:     #94a3b8;
    --text3:     #475569;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .topbar-title span { color: var(--accent); }

  .topbar-badge {
    background: rgba(56,189,248,0.1);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* credentials row */
  .cred-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-left: auto;
  }

  .cred-input {
    background: var(--bg);
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 5px;
    padding: 5px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  .cred-input:focus { border-color: var(--accent); }
  .cred-input::placeholder { color: var(--text3); }
  .cred-input.url { width: 280px; }
  .cred-input.user { width: 130px; }
  .cred-input.pass { width: 120px; }

  .btn-connect {
    background: linear-gradient(135deg, #0284c7, var(--accent2));
    border: none;
    border-radius: 5px;
    padding: 5px 14px;
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-connect:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-connect:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR CATALOG TREE ── */
  .catalog-panel {
    width: 300px;
    flex-shrink: 0;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,189,248,0.04);
  }
  .panel-header-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .panel-status {
    margin-left: auto;
    font-size: 9px;
    color: var(--text3);
  }
  .panel-status.connected { color: var(--green); }
  .panel-status.loading   { color: var(--gold); }
  .panel-status.error     { color: var(--red); }

  .tree-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .tree-wrap::-webkit-scrollbar { width: 4px; }
  .tree-wrap::-webkit-scrollbar-track { background: transparent; }
  .tree-wrap::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 2px; }

  /* ── TREE NODES ── */
  .tree-node {
    user-select: none;
  }

  .tree-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.12s;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
  }
  .tree-row:hover { background: rgba(56,189,248,0.06); color: var(--text); }
  .tree-row.active { background: rgba(167,139,250,0.12); color: var(--xdm); }
  .tree-row.loading-row { color: var(--text3); font-style: italic; cursor: default; }
  .tree-row.loading-row:hover { background: none; }

  .tree-toggle {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    color: var(--text3);
    transition: transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-toggle svg { width: 8px; height: 8px; }
  .tree-toggle.leaf { visibility: hidden; }

  .tree-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tree-icon svg { width: 13px; height: 13px; }
  .icon-folder { color: var(--folder); }
  .icon-xdm    { color: var(--xdm); }
  .icon-spin   { color: var(--gold); animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tree-label {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tree-children {
    display: none;
  }
  .tree-children.open {
    display: block;
  }

  /* indent per depth */
  .tree-row { padding-left: calc(10px + var(--depth, 0) * 14px); }

  /* ── SQL EDITOR PANEL ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .editor-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .editor-path {
    font-size: 10px;
    color: var(--xdm);
    margin-left: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 500px;
  }
  .editor-ds {
    margin-left: auto;
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 9px;
    color: var(--xdm);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .editor-body {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .editor-textarea {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 16px 20px;
    tab-size: 2;
  }

  /* placeholder state */
  .editor-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
  }
  .editor-placeholder svg { width: 40px; height: 40px; color: var(--text3); opacity: 0.4; }
  .editor-placeholder p { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.6; }

  /* loading overlay */
  .editor-loading {
    position: absolute;
    inset: 0;
    background: rgba(11,15,26,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .editor-loading.visible { display: flex; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .editor-loading p { font-size: 11px; color: var(--text2); }

  /* bottom status bar */
  .statusbar {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 4px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
  }
  .status-dot.ok     { background: var(--green); box-shadow: 0 0 4px rgba(52,211,153,0.5); }
  .status-dot.error  { background: var(--red); }
  .status-dot.busy   { background: var(--gold); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .use-btn {
    margin-left: auto;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 4px;
    padding: 3px 12px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .use-btn.visible { display: block; }
  .use-btn:hover { background: rgba(52,211,153,0.18); }
</style>
</head>
<body>

<!-- Top bar with credentials -->
<div class="topbar">
  <div class="topbar-title">QueryForge <span>DataZen</span></div>
  <div class="topbar-badge">Catalog Browser</div>
  <div class="cred-row">
    <input class="cred-input url"  id="cb-url"  type="url"      placeholder="https://instance.fa.oraclecloud.com" />
    <input class="cred-input user" id="cb-user" type="text"     placeholder="username" />
    <input class="cred-input pass" id="cb-pass" type="password" placeholder="password" />
    <button class="btn-connect" id="cb-connect" onclick="connectCatalog()">Connect</button>
  </div>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Catalog tree panel -->
  <div class="catalog-panel">
    <div class="panel-header">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--accent)">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="panel-header-title">Catalog</span>
      <span class="panel-status" id="panel-status">Not connected</span>
    </div>
    <div class="tree-wrap" id="tree-wrap">
      <div class="tree-row loading-row" style="--depth:0">
        <span class="tree-label" style="color:var(--text3);font-size:10px;">Enter credentials above and click Connect</span>
      </div>
    </div>
  </div>

  <!-- SQL editor panel -->
  <div class="editor-panel">
    <div class="editor-header">
      <span class="editor-title">SQL Editor</span>
      <span class="editor-path" id="editor-path"></span>
      <span class="editor-ds" id="editor-ds" style="display:none"></span>
    </div>
    <div class="editor-body">
      <div class="editor-placeholder" id="editor-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
        <p>Connect to your Fusion instance<br>then click a <span style="color:var(--xdm)">Data Model (.xdm)</span><br>to load its SQL here</p>
      </div>
      <textarea class="editor-textarea" id="sql-editor" spellcheck="false" style="display:none"></textarea>
      <div class="editor-loading" id="editor-loading">
        <div class="spinner"></div>
        <p id="editor-loading-msg">Fetching data model…</p>
      </div>
    </div>
    <div class="statusbar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-msg">Ready</span>
      <button class="use-btn" id="use-btn" onclick="copySqlToClipboard()">⎘ Copy SQL</button>
    </div>
  </div>

</div>

<script>
const BACKEND = 'https://queryforge-backend-mroa.onrender.com';

// ── State ─────────────────────────────────────────────────────────
var creds = { fusionUrl: '', username: '', password: '' };
var activeXdmNode = null;

// ── Connect ───────────────────────────────────────────────────────
async function connectCatalog() {
  creds.fusionUrl = document.getElementById('cb-url').value.trim().replace(/\/+$/, '');
  creds.username  = document.getElementById('cb-user').value.trim();
  creds.password  = document.getElementById('cb-pass').value;

  if (!creds.fusionUrl || !creds.username || !creds.password) {
    setStatus('error', 'Fill in all credential fields');
    return;
  }

  const btn = document.getElementById('cb-connect');
  btn.disabled = true;
  btn.textContent = 'Connecting…';
  setPanelStatus('loading', 'Connecting…');
  setStatus('busy', 'Connecting to Fusion catalog…');

  // Load root /shared
  const wrap = document.getElementById('tree-wrap');
  wrap.innerHTML = '';

  try {
    await loadFolder('/', wrap, 0, true);
    setPanelStatus('connected', 'Connected');
    setStatus('ok', 'Catalog loaded — click a .xdm to view SQL');
  } catch(e) {
    setPanelStatus('error', 'Failed');
    setStatus('error', 'Connection failed: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Connect';
}

// ── Load folder contents ──────────────────────────────────────────
async function loadFolder(path, container, depth, autoExpand) {
  const resp = await fetch(BACKEND + '/catalog/folders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...creds, path })
  });

  const data = await resp.json();

if (!data.ok) {
  const errRow = document.createElement('div');
  errRow.className = 'tree-row loading-row';
  errRow.style.setProperty('--depth', depth);
  errRow.innerHTML = '<span class="tree-label" style="color:var(--red)">⚠ ' + (data.message || 'Error') + '</span>';
  container.appendChild(errRow);
  return;
}

  if (!data.items || data.items.length === 0) {
    const emptyRow = document.createElement('div');
    emptyRow.className = 'tree-row loading-row';
    emptyRow.style.setProperty('--depth', depth);
    emptyRow.innerHTML = '<span class="tree-label" style="font-style:italic;color:var(--text3)">Empty folder</span>';
    container.appendChild(emptyRow);
    return;
  }

  // Sort: folders first, then xdm files
  data.items.sort((a, b) => {
    if (a.type === b.type) return a.name.localeCompare(b.name);
    return a.type === 'folder' ? -1 : 1;
  });

  data.items.forEach(item => {
    const node = buildTreeNode(item, depth);
    container.appendChild(node);
  });
}

// ── Build tree node ───────────────────────────────────────────────
function buildTreeNode(item, depth) {
  const node = document.createElement('div');
  node.className = 'tree-node';

  const row = document.createElement('div');
  row.className = 'tree-row';
  row.style.setProperty('--depth', depth);

  if (item.type === 'folder') {
    // Toggle arrow
    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`;

    // Folder icon
    const icon = document.createElement('span');
    icon.className = 'tree-icon icon-folder';
    icon.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" opacity="0.85"/></svg>`;

    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = item.name;

    row.appendChild(toggle);
    row.appendChild(icon);
    row.appendChild(label);

    // Children container (lazy loaded)
    const children = document.createElement('div');
    children.className = 'tree-children';

    var loaded = false;
    row.addEventListener('click', async () => {
      const isOpen = children.classList.contains('open');
      if (isOpen) {
        children.classList.remove('open');
        toggle.classList.remove('open');
      } else {
        children.classList.add('open');
        toggle.classList.add('open');

        if (!loaded) {
          loaded = true;
          // Show spinner row
          const spinRow = document.createElement('div');
          spinRow.className = 'tree-row loading-row';
          spinRow.style.setProperty('--depth', depth + 1);
          spinRow.innerHTML = `
            <span class="tree-icon icon-spin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
            </span>
            <span class="tree-label">Loading…</span>`;
          children.appendChild(spinRow);

          try {
            await loadFolder(item.path, children, depth + 1, false);
          } catch(e) {
            children.innerHTML = '';
            const errRow = document.createElement('div');
            errRow.className = 'tree-row loading-row';
            errRow.style.setProperty('--depth', depth + 1);
            errRow.innerHTML = `<span class="tree-label" style="color:var(--red)">⚠ Failed to load</span>`;
            children.appendChild(errRow);
          }

          // Remove spinner
          if (spinRow.parentNode) spinRow.parentNode.removeChild(spinRow);
        }
      }
    });

    node.appendChild(row);
    node.appendChild(children);

  } else if (item.type === 'xdm') {
    // XDM leaf node
    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle leaf';
    toggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>`;

    const icon = document.createElement('span');
    icon.className = 'tree-icon icon-xdm';
    icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`;

    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = item.name;
    label.title = item.path;

    row.appendChild(toggle);
    row.appendChild(icon);
    row.appendChild(label);

    row.addEventListener('click', () => loadXdm(item, row));
    node.appendChild(row);
  }

  return node;
}

// ── Load XDM and extract SQL ──────────────────────────────────────
async function loadXdm(item, rowEl) {
  // Deactivate previous
  if (activeXdmNode) activeXdmNode.classList.remove('active');
  activeXdmNode = rowEl;
  rowEl.classList.add('active');

  // Show loading
  document.getElementById('editor-placeholder').style.display = 'none';
  document.getElementById('sql-editor').style.display = 'none';
  const loading = document.getElementById('editor-loading');
  loading.classList.add('visible');
  document.getElementById('editor-loading-msg').textContent = 'Fetching ' + item.name + '…';
  document.getElementById('editor-path').textContent = item.path;
  setStatus('busy', 'Loading data model…');

  try {
    const resp = await fetch(BACKEND + '/catalog/xdm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...creds, path: item.path })
    });

    const data = await resp.json();
    loading.classList.remove('visible');

    if (!data.ok || !data.sql) {
      document.getElementById('editor-placeholder').style.display = 'flex';
      setStatus('error', data.message || 'No SQL found in this data model');
      return;
    }

    // Show SQL in editor
    const editor = document.getElementById('sql-editor');
    editor.value = data.sql;
    editor.style.display = 'block';

    // Show data source chip
    if (data.dataSource) {
      const ds = document.getElementById('editor-ds');
      ds.textContent = data.dataSource;
      ds.style.display = 'block';
    }

    document.getElementById('use-btn').classList.add('visible');
    setStatus('ok', 'SQL loaded from ' + item.name + ' — ' + data.sql.split('\n').length + ' lines');

  } catch(e) {
    loading.classList.remove('visible');
    document.getElementById('editor-placeholder').style.display = 'flex';
    setStatus('error', 'Failed to fetch XDM: ' + e.message);
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function setPanelStatus(type, msg) {
  const el = document.getElementById('panel-status');
  el.className = 'panel-status ' + type;
  el.textContent = msg;
}

function setStatus(type, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + type;
  document.getElementById('status-msg').textContent = msg;
}

async function copySqlToClipboard() {
  const sql = document.getElementById('sql-editor').value;
  try {
    await navigator.clipboard.writeText(sql);
    const btn = document.getElementById('use-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '⎘ Copy SQL'; }, 1500);
  } catch(e) {
    alert('Copy failed — select all and copy manually.');
  }
}

// Auto-fill from sessionStorage/localStorage (same keys used by main app)
window.onload = function() {
  try {
    var session = JSON.parse(sessionStorage.getItem('qfdz_session') || localStorage.getItem('qfdz_session') || 'null');
    // Try to get active connection from main app storage
    if (session && session.id) {
      var localKey = 'csWebConns_u' + session.id;
      var conns = JSON.parse(localStorage.getItem(localKey) || '[]');
      if (conns.length > 0) {
        document.getElementById('cb-url').value  = conns[0].url  || '';
        document.getElementById('cb-user').value = conns[0].user || '';
        // Can't auto-fill password for security — user must type it
        setStatus('busy', 'Credentials pre-filled from saved connection — enter password to connect');
      }
    }
  } catch(e) {}
};
</script>
</body>
</html>
